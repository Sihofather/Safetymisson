<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세이프 미 (Safe me)</title>
  <style>
    body { text-align: center; background-color: #e6f7ff; font-family: sans-serif; padding-top: 10px; font-size: 20px; margin: 0; }
    #noticeBanner { background-color: #ff5252; color: white; padding: 15px; font-size: 22px; font-weight: bold; display: none; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); text-align: center; word-break: keep-all; }
    h1 { font-size: 36px; color: #333; margin-bottom: 20px; margin-top: 30px; }
    .btn { display: block; margin: 15px auto; padding: 25px; font-size: 24px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; color: white; width: 90%; max-width: 450px; }
    .qr-btn { background-color: #2196F3; } 
    .user-btn { background-color: #4CAF50; } 
    .msg-btn { background-color: #9c27b0; } 
    /* ⭐ 임시 목록(투표) 버튼 스타일 ⭐ */
    .vote-btn { background-color: #ff9800; display: none; } 
    .secret-gear { position: absolute; top: 15px; right: 15px; font-size: 30px; background: none; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <div id="noticeBanner">📢 불러오는 중...</div>
  <button class="secret-gear" onclick="var p=prompt('관리자 암호?'); if(p==='1234') location.href='admin.html';">⚙️</button>
  
  <h1>🌟 세이프 미 (Safe me) 🌟</h1>
  
  <button class="btn qr-btn" onclick="location.href='qr.html'">📝 일일 안전미션</button>
  <button class="btn user-btn" onclick="location.href='user.html'">👷‍♂️ 내 상태 확인</button>
  
  <button id="voteBtn" class="btn vote-btn" onclick="location.href='vote.html'"></button>
  
  <button class="btn msg-btn" onclick="location.href='message.html'">✉️ 1:1 건의함 (쪽지)</button>

  <section id="suggestionBoard" style="display:none; margin-top:30px; padding-bottom:30px;"></section>

  <script type="module">
    import { db, ref, onValue } from "./firebase-setup.js";
    
    // 현수막 마법
    onValue(ref(db, 'settings/banner'), (snap) => {
      const banner = document.getElementById("noticeBanner");
      if(snap.exists() && snap.val() !== "") {
        banner.innerHTML = "📢 " + snap.val();
        banner.style.display = "block";
      } else {
        banner.style.display = "none";
      }
    });

    // ⭐ 투표(임시 목록) 활성화 마법 ⭐
    onValue(ref(db, 'settings/voting'), (snap) => {
      const voteData = snap.val();
      const voteBtn = document.getElementById("voteBtn");
      if(voteData && voteData.isActive) {
        voteBtn.innerHTML = `🗳️ ${voteData.title}`; // 관리자가 정한 이름으로 바뀜
        voteBtn.style.display = "block";
      } else {
        voteBtn.style.display = "none";
      }
    });

    // 💡 제안 현황판
    let suggestionBoardActive = false;
    let suggestionsData = null;

    onValue(ref(db, 'settings/suggestionBoard/isActive'), (snap) => {
      suggestionBoardActive = snap.exists() && snap.val() === true;
      renderSuggestionBoard();
    });

    onValue(ref(db, 'suggestions'), (snap) => {
      suggestionsData = snap.exists() ? snap.val() : null;
      renderSuggestionBoard();
    });

    function renderSuggestionBoard() {
      const board = document.getElementById('suggestionBoard');
      board.innerHTML = '';

      if (!suggestionBoardActive || !suggestionsData) {
        board.style.display = 'none';
        return;
      }

      const items = Object.entries(suggestionsData)
        .sort((a, b) => (b[1].time || 0) - (a[1].time || 0))
        .slice(0, 20);

      if (items.length === 0) {
        board.style.display = 'none';
        return;
      }

      board.style.display = 'block';

      const title = document.createElement('h2');
      title.textContent = '💡 우리의 개선 제안';
      title.style.cssText = 'color:#333; margin:20px 0 10px; font-size:26px;';
      board.appendChild(title);

      items.forEach(([key, s]) => {
        const card = document.createElement('div');
        card.style.cssText = 'background:white; border-radius:15px; box-shadow:0 2px 8px rgba(0,0,0,0.08); padding:20px; margin:15px auto; width:90%; max-width:450px; text-align:left;';

        const dateEl = document.createElement('div');
        dateEl.style.cssText = 'font-size:13px; color:gray; margin-bottom:8px;';
        dateEl.textContent = s.date || '';
        card.appendChild(dateEl);

        const contentEl = document.createElement('div');
        contentEl.style.cssText = 'white-space:pre-wrap; font-size:17px; margin-bottom:12px; color:#333;';
        contentEl.textContent = s.content || '';
        card.appendChild(contentEl);

        if (s.beforeThumb || s.afterThumb || s.beforeText || s.afterText) {
          const row = document.createElement('div');
          row.style.cssText = 'display:flex; flex-wrap:wrap; gap:8px; justify-content:center; align-items:stretch;';

          const buildThumb = (label, thumb, full, text, altText) => {
            if (!thumb && !text) return null;
            const wrap = document.createElement('div');
            wrap.style.cssText = 'flex:1; min-width:120px; max-width:220px; text-align:center; display:flex; flex-direction:column; gap:6px;';
            const lbl = document.createElement('div');
            lbl.style.cssText = 'font-size:14px; font-weight:bold; color:#555;';
            lbl.textContent = label;
            wrap.appendChild(lbl);
            if (thumb) {
              const img = document.createElement('img');
              img.src = thumb;
              img.loading = 'lazy';
              img.alt = altText;
              img.style.cssText = 'width:100%; max-width:200px; border-radius:8px; cursor:pointer; border:1px solid #eee; align-self:center;';
              img.addEventListener('click', () => openImageModal(full || thumb, altText));
              wrap.appendChild(img);
            }
            if (text) {
              const t = document.createElement('div');
              t.style.cssText = 'white-space:pre-wrap; font-size:14px; color:#333; background:#f5f5f5; padding:8px 10px; border-radius:8px; text-align:left; word-break:break-word; line-height:1.4;';
              t.textContent = text;
              wrap.appendChild(t);
            }
            return wrap;
          };

          const b = buildThumb('개선 전', s.beforeThumb, s.beforeFull, s.beforeText, '개선 전 사진');
          const a = buildThumb('개선 후', s.afterThumb, s.afterFull, s.afterText, '개선 후 사진');
          if (b) row.appendChild(b);
          if (b && a) {
            const arrow = document.createElement('div');
            arrow.textContent = '➡️';
            arrow.setAttribute('aria-hidden', 'true');
            arrow.style.cssText = 'flex:0 0 auto; font-size:32px; color:#ff7043; align-self:center; padding:0 4px;';
            row.appendChild(arrow);
          }
          if (a) row.appendChild(a);
          card.appendChild(row);
        }

        board.appendChild(card);
      });
    }

    function openImageModal(src, altText) {
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed; inset:0; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:9999; padding:20px; cursor:pointer;';
      const img = document.createElement('img');
      img.src = src;
      img.alt = altText;
      img.style.cssText = 'max-width:100%; max-height:100%; border-radius:8px;';
      modal.appendChild(img);
      const close = () => { modal.remove(); document.removeEventListener('keydown', escHandler); };
      const escHandler = (e) => { if (e.key === 'Escape') close(); };
      modal.addEventListener('click', close);
      document.addEventListener('keydown', escHandler);
      document.body.appendChild(modal);
    }
  </script>
</body>
</html>
